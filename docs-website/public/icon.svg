<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B3FE4"/>
      <stop offset="100%" stop-color="#512BD4"/>
    </linearGradient>
    <linearGradient id="glass" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#C4A8FF" stop-opacity="0.08"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="128" height="128" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <g clip-path="url(#roundClip)">
    <!-- Code lines background (scattered, different lengths) -->
    <!-- Row 1 -->
    <rect x="12" y="16" width="28" height="4" rx="2" fill="#FFFFFF" opacity="0.12"/>
    <rect x="44" y="16" width="16" height="4" rx="2" fill="#FFFFFF" opacity="0.08"/>
    <rect x="64" y="16" width="36" height="4" rx="2" fill="#FFFFFF" opacity="0.06"/>
    <!-- Row 2 -->
    <rect x="18" y="26" width="20" height="4" rx="2" fill="#FFFFFF" opacity="0.08"/>
    <rect x="42" y="26" width="44" height="4" rx="2" fill="#A78BFA" opacity="0.25"/>
    <rect x="90" y="26" width="18" height="4" rx="2" fill="#FFFFFF" opacity="0.06"/>
    <!-- Row 3 -->
    <rect x="18" y="36" width="14" height="4" rx="2" fill="#FFFFFF" opacity="0.06"/>
    <rect x="36" y="36" width="32" height="4" rx="2" fill="#C084FC" opacity="0.3"/>
    <rect x="72" y="36" width="24" height="4" rx="2" fill="#FFFFFF" opacity="0.1"/>
    <!-- Row 4 -->
    <rect x="18" y="46" width="10" height="4" rx="2" fill="#FFFFFF" opacity="0.06"/>
    <rect x="32" y="46" width="40" height="4" rx="2" fill="#7DD3FC" opacity="0.35"/>
    <rect x="76" y="46" width="14" height="4" rx="2" fill="#FFFFFF" opacity="0.08"/>
    <!-- Row 5 -->
    <rect x="18" y="56" width="14" height="4" rx="2" fill="#FFFFFF" opacity="0.06"/>
    <rect x="36" y="56" width="28" height="4" rx="2" fill="#86EFAC" opacity="0.3"/>
    <rect x="68" y="56" width="32" height="4" rx="2" fill="#FFFFFF" opacity="0.08"/>
    <!-- Row 6 -->
    <rect x="18" y="66" width="20" height="4" rx="2" fill="#FFFFFF" opacity="0.08"/>
    <rect x="42" y="66" width="36" height="4" rx="2" fill="#A78BFA" opacity="0.2"/>
    <!-- Row 7 -->
    <rect x="12" y="76" width="24" height="4" rx="2" fill="#FFFFFF" opacity="0.1"/>
    <rect x="40" y="76" width="18" height="4" rx="2" fill="#FFFFFF" opacity="0.06"/>
    <!-- Row 8 -->
    <rect x="12" y="86" width="40" height="4" rx="2" fill="#FFFFFF" opacity="0.08"/>
    <rect x="56" y="86" width="22" height="4" rx="2" fill="#7DD3FC" opacity="0.2"/>
    <!-- Row 9 -->
    <rect x="12" y="96" width="18" height="4" rx="2" fill="#FFFFFF" opacity="0.06"/>
    <rect x="34" y="96" width="30" height="4" rx="2" fill="#FFFFFF" opacity="0.08"/>

    <!-- Magnifying glass -->
    <!-- Glass shadow -->
    <circle cx="84" cy="80" r="30" fill="#000000" opacity="0.15"/>
    <!-- Glass ring -->
    <circle cx="82" cy="78" r="30" fill="none" stroke="#2D1B69" stroke-width="6"/>
    <circle cx="82" cy="78" r="30" fill="none" stroke="#E0D4FF" stroke-width="3"/>
    <!-- Glass fill -->
    <circle cx="82" cy="78" r="27" fill="url(#glass)"/>
    <!-- Glass highlight -->
    <path d="M68 65 Q72 60 80 62" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>

    <!-- Code symbol inside lens -->
    <text x="82" y="82" font-family="Consolas,'Courier New',monospace" font-size="20"
          font-weight="bold" fill="#FFFFFF" text-anchor="middle"
          dominant-baseline="middle" opacity="0.9">&lt;/&gt;</text>

    <!-- Handle shadow -->
    <line x1="102" y1="100" x2="118" y2="116" stroke="#000000" stroke-width="8"
          stroke-linecap="round" opacity="0.15"/>
    <!-- Handle -->
    <line x1="100" y1="98" x2="116" y2="114" stroke="#2D1B69" stroke-width="7"
          stroke-linecap="round"/>
    <line x1="100" y1="98" x2="116" y2="114" stroke="#E0D4FF" stroke-width="4"
          stroke-linecap="round"/>
  </g>
</svg>
