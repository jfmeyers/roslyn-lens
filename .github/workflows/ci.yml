name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install SonarScanner
        if: env.SONAR_TOKEN != ''
        run: dotnet tool install --global dotnet-sonarscanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Restore
        run: dotnet restore

      - name: SonarCloud Begin
        if: env.SONAR_TOKEN != ''
        run: |
          dotnet sonarscanner begin \
            /k:"jfmeyers_roslyn-lens" \
            /o:"jfmeyers" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" \
            /d:sonar.coverage.exclusions="**/Tests/**,**/Tools/**,**/Program.cs,**/WorkspaceInitializer.cs,**/WorkspaceManager.cs,**/Responses/**,**/DuplicateCodeDetector.cs,**/ExternalSourceResolver.cs,**/SymbolResolver.cs,**/EfCoreNoTrackingDetector.cs,**/SynchronousSaveChangesDetector.cs,**/MissingConfigureAwaitDetector.cs" \
            /d:sonar.exclusions="**/.github/**,global.json" \
            /d:sonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Check vulnerable packages
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee /tmp/audit.log
          if grep -q 'has the following vulnerable packages' /tmp/audit.log; then
            echo "::error::Vulnerable NuGet packages detected"
            exit 1
          fi

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: |
          dotnet test --no-build -c Release \
            --logger "trx;LogFileName=results.trx" \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[RoslynLens]*" \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*.Tests]*"

      - name: SonarCloud End
        if: env.SONAR_TOKEN != ''
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Pack
        run: dotnet pack --no-build -c Release -o ./nupkgs

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./nupkgs/*.nupkg
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./**/TestResults/*.trx
          retention-days: 7
